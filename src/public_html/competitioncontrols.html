<!doctype html>
<html lang="en">
  <head>
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
		<link rel="manifest" href="/site.webmanifest">

        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="libs/TableSorter/css/theme.bootstrap_4.min.css" rel="stylesheet" crossorigin="anonymous">
        <!-- Bootstrap CSS -->
        <link href="libs/bootstrap-5.3.3-dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="ui/css/wiroc.css" />
    
        <title>WiRoc Monitor</title>
  </head>
  <body>
		<div id="itemCreatedAlert" class="alert alert-success alert-dismissible collapse" style="margin-bottom:0;" role="alert">
				<strong>The control was created!</strong>
				<button type="button" class="btn-close close" aria-label="Close"></button>
		</div>
		<div id="itemUpdatedAlert" class="alert alert-success alert-dismissible collapse" style="margin-bottom:0;" role="alert">
				<strong>The control was updated!</strong>
				<button type="button" class="btn-close close" aria-label="Close"></button>
		</div>
                               
		<div id="nav-placeholder"></div>
        <div class="container-fluid">
                <h1 id="pageHeader">Controls for competition</h1>

                <button type="button" id="btnOpenAddItem" class="btn btn-secondary small" data-bs-toggle="modal" data-bs-target="#additem" style="display:none">Add new control</button>
                <br/>
                <div class="table-responsive">
                        <table class="table table-striped table-hover table-sm" id="Controls">
                        <caption>List of Controls</caption>
                        <thead>
                                <tr>
										<th scope="col">Id</th>
										<th scope="col">Control Number</th>
                                	<th scope="col">Name</th>
										<th scope="col">Description</th>
										<th scope="col" class="editcol"></th>
										<th scope="col" class="deletecol"></th>
                                </tr>
                        </thead>
                        <tbody>
                        </tbody>
                        </table>
                </div>

				<div class="modal fade" id="confirm-delete" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
					<div class="modal-dialog">
							<div class="modal-content">
							<div class="modal-header">
									Delete control?
							</div>
							<div class="modal-body">
									Are you sure you want to delete the control?
							</div>
							<div class="modal-footer">
									<button type="button" class="btn btn-default" data-bs-dismiss="modal">Cancel</button>
									<a class="btn btn-danger btn-ok">Delete</a>
							</div>
							</div>
					</div>
				</div>
                <div id="signup-modal-placeholder"></div>
                <div id="addnewitem-modal-placeholder"></div>
                
                <!-- Optional JavaScript; choose one of the two! -->
                <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
                <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
                <script src="libs/TableFilter/TableFilter.js" type="text/javascript"></script>
                <script src="libs/TableSorter/js/jquery.tablesorter.min.js" type="text/javascript"></script>
                <script src="libs/TableSorter/js/jquery.tablesorter.widgets.min.js" type="text/javascript"></script>
      <script src="navinit.js"></script>

                <script>
                $.urlParam = function (name) {
                  var results = new RegExp("[\?&]" + name + "=([^&#]*)").exec(
                    window.location.search
                  );
                  return results !== null ? results[1] || 0 : false;
                };

                var competitionId = $.urlParam("competitionId");
                var tableName = "Controls";
                var modalHtmlFileName = "addcontrolmodal.html";
                var competitionTableName = "Competitions";
                var hasAccess = false;

                function loadHeader() {
                  $.ajax({
                    url: "/api/v1/" + competitionTableName + "/" + competitionId,
                    dataType: "json"
                  }).then(function(comp) {
                    $("#pageHeader").text("Controls for competition: " + comp.name);
                  });
                }

                function checkCompetitionAccess(callback) {
                  $.ajax({
                    url: "/api/v1/login",
                    dataType: "json"
                  }).then(function(loginResp) {
                    if (!loginResp.isLoggedIn) {
                      callback(false);
                      return;
                    }
                    if (loginResp.isAdmin) {
                      callback(true);
                      return;
                    }
                    // Check if user is the creator of the competition
                    $.ajax({
                      url: "/api/v1/" + competitionTableName + "/" + competitionId,
                      dataType: "json"
                    }).then(function(comp) {
                      if (comp.createdByUserId == loginResp.userId) {
                        callback(true);
                        return;
                      }
                      // Also check CompetitionAccesses
                      $.ajax({
                        url: "/api/v1/CompetitionAccess",
                        dataType: "json"
                      }).then(function(entries) {
                        var hasAccess = false;
                        if (entries) {
                          $.each(entries, function() {
                            if (this.competitionId == competitionId) {
                              hasAccess = true;
                              return false;
                            }
                          });
                        }
                        callback(hasAccess);
                      }, function() {
                        callback(false);
                      });
                    });
                  });
                }

                function loadTable() {
                        var jqTable = $("#" + tableName);
                        var jqTableTBody = $("#" + tableName + " tbody");
                        $.ajax({
                                url: "/api/v1/" + tableName + "?competitionId=" + competitionId + "&sort=controlNumber",
                                dataType: "json"
                        }).then(function(items) {
                                jqTableTBody.empty();
                                $.each(items, function() {
                                        jqTableTBody.append('<tr><td>' + this.id + '</td><td>' + this.controlNumber + '</td><td>' + this.name + '</td><td>' + (this.description || '') + '</td><td><button class="btn fa fa-pencil edititem" data-id="' + this.id  + '" /></td><td><button class="deleteitem btn fa fa-trash" data-bs-toggle="modal" data-bs-target="#confirm-delete" data-id="' + this.id + '" /></td></tr>');
                                });

                                jqTable.tablesorter({ theme: 'bootstrap'});
                                var resort = true;
                                jqTable.trigger("update", [resort]);

                                var tooltip = 'Quotes (\") match phrases. (not) excludes a match from the results. (or) can be used to do Or searches. I.e. [red or blue] will match either red or blue. Numeric values support >=, >, <=, <, = and != operators.';
                                var optionsbasic = {
                                        columnFilters: [   
                                                { columnName: 'Id', inputType: 'text', toolTipMessage: tooltip},
                                                { columnName: 'Control Number', inputType: 'text', toolTipMessage: tooltip},
                                                { columnName: 'Name', inputType: 'text', toolTipMessage: tooltip},
                                                { columnName: 'Description', inputType: 'text', toolTipMessage: tooltip},
                                                { columnName: '', inputType: 'none'},
                                                { columnName: '', inputType: 'none'}
                                        ],
                                        enableCookies: false
                                };

                                jqTable.tableFilter(optionsbasic);
                                jqTable.tableFilter('reload');
                        });
                }

                $(document).ready(function() {
                    loadHeader();

                    checkCompetitionAccess(function(access) {
                      hasAccess = access;
                      if (hasAccess) {
                        $("#btnOpenAddItem").show();
                        $(".editcol").show();
                        $(".deletecol").show();
                        $(".edititem").show();
                        $(".deleteitem").show();
                      } else {
                        $("#btnOpenAddItem").hide();
                        $(".editcol").hide();
                        $(".deletecol").hide();
                        $(".edititem").hide();
                        $(".deleteitem").hide();
                      }
                    });

					$("#nav-placeholder").load("navigation.html", function() {
            initNavigation();
						
						$("#addnewitem-modal-placeholder").load(modalHtmlFileName, function() {
								$('#btnOpenAddItem').click(function() {
									$('#addItemDescription').text('Please fill in the form to add a new control');
									$('#addItemTitle').text('Add control');
									$('#buttonAddItem').text('Add control');
									$('#controlNumberInput').val("");
									$('#controlNameInput').val("");
									$('#controlDescriptionInput').val("");
									var addItemForm = $('#addItemForm');
									addItemForm.removeData('id');
									var itemModalElement = document.querySelector('#additem');
									var itemModal = bootstrap.Modal.getOrCreateInstance(itemModalElement);
									itemModal.show();
								});

								$('#additem').on('shown.bs.modal', function () {
										$('#controlNameInput').trigger('focus');
								});

								var addItemForm = $('#addItemForm');
								$('#buttonAddItem').click(function() {
										if (addItemForm[0].checkValidity()) {
											var id = addItemForm.data('id');
											var controlNumber = parseInt($('#controlNumberInput').val());
											var controlName = $('#controlNameInput').val();
											var controlDescription = $('#controlDescriptionInput').val();
											var postItemData = "";
											if (id == null) {
												postItemData = JSON.stringify({
													"competitionId": parseInt(competitionId),
													"controlNumber": controlNumber,
													"name": controlName,
													"description": controlDescription
												});
											} else {
												postItemData = JSON.stringify({
													"id": id,
													"competitionId": parseInt(competitionId),
													"controlNumber": controlNumber,
													"name": controlName,
													"description": controlDescription
												});
											} 
											$.ajax({
													url: "/api/v1/" + tableName,
													method: "POST",
													data: postItemData,
													dataType: "json"
											}).then(function(release) {
													$('#errorAlert').addClass('collapse');
													var itemModalElement = document.querySelector('#additem');
													var itemModal = bootstrap.Modal.getOrCreateInstance(itemModalElement);
													itemModal.hide();
													if (id == null) {
															$('#itemCreatedAlert').removeClass('collapse');
													} else {
															$('#itemUpdatedAlert').removeClass('collapse');
													}
													loadTable();
											}, function(fail) {
													var errorMsg = "Could not save, error while saving to database";
													if (fail.responseJSON && fail.responseJSON.message) {
														errorMsg = fail.responseJSON.message;
													}
													$('#errorAlert').text(errorMsg);
													$('#errorAlert').removeClass('collapse');     
											});
										} else {
												addItemForm[0].classList.add('was-validated');
										}
								});
						});
						
						
						$(document).on("click", ".close", function(){
								$(this).parent().addClass('collapse');
						});

						$(document).on("click", ".edititem", function(){
							var itemId = $(this).data('id');
							var addItemForm = $('#addItemForm');

							$.ajax({
									url: "/api/v1/" + tableName + "/" + itemId,
									dataType: "json"
							}).then(function(item) {
									addItemForm.data("id", itemId);
									$('#controlNumberInput').val(item.controlNumber);
									$('#controlNameInput').val(item.name);
									$('#controlDescriptionInput').val(item.description);
									
									$('#addItemDescription').text('Please fill in the form to edit the control');
									$('#addItemTitle').text('Edit control');
									$('#buttonAddItem').text('Save control');
									var itemModalElement = document.querySelector('#additem');
									var itemModal = bootstrap.Modal.getOrCreateInstance(itemModalElement);
									itemModal.show();
							});
							
						});

						// Bind click to OK button within delete popup
						$('#confirm-delete').on('click', '.btn-ok', function(e) {
								var modalDiv = $(e.delegateTarget);
								var itemId = modalDiv.data('id');

								$.ajax({
										url: "/api/v1/" + tableName + "/" + itemId,
										method: "DELETE",
										dataType: "json"
								}).then(
										function() {
												modalDiv.modal('hide');
												loadTable();
										},
										function(fail) {
												modalDiv.modal('hide');
												loadTable();
										}
								);
						});

						// Bind to modal opening to set necessary data properties to be used to make request
						$('#confirm-delete').on('show.bs.modal', function(e) {
								var itemId = $(e.relatedTarget).data('id');
								$('#confirm-delete').data('id', itemId);
						});

						loadTable();
					});
                });
                </script>
        </div>
  </body>
</html>
