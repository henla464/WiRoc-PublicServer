<!doctype html>
<html lang="en">
  <head>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="libs/bootstrap-5.3.3-dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="ui/css/wiroc.css" />
    <title>Analyze Logs - WiRoc Monitor</title>
  </head>
  <body>
    <div id="nav-placeholder"></div>
    <div class="container-fluid">
      <h1>Analyze Logs</h1>
      <div id="loginRequiredAlert" class="alert alert-warning collapse" role="alert">
        <strong>Please log in to use the log analyzer.</strong>
      </div>

      <div id="analyzerSection" style="display:none">
        <div class="row mb-3">
          <div class="col-md-6">
            <div class="card">
              <div class="card-header"><strong>Sender WiRoc Device</strong></div>
              <div class="card-body">
                <div class="mb-2">
                  <label for="senderDeviceSelect" class="form-label">Device</label>
                  <select id="senderDeviceSelect" class="form-select analyze-selector">
                    <option value="">-- Select a sender device --</option>
                  </select>
                </div>
                <div class="mb-2">
                  <label for="senderZipSelect" class="form-label">Zip File</label>
                  <select id="senderZipSelect" class="form-select analyze-selector" disabled>
                    <option value="">-- First select a device --</option>
                  </select>
                </div>
              </div>
            </div>
          </div>

          <div class="col-md-6">
            <div class="card">
              <div class="card-header"><strong>Receiver WiRoc Device</strong> <small class="text-muted">(optional)</small></div>
              <div class="card-body">
                <div class="mb-2">
                  <label for="receiverDeviceSelect" class="form-label">Device</label>
                  <select id="receiverDeviceSelect" class="form-select analyze-selector">
                    <option value="">-- Optional: select receiver --</option>
                  </select>
                </div>
                <div class="mb-2">
                  <label for="receiverZipSelect" class="form-label">Zip File</label>
                  <select id="receiverZipSelect" class="form-select analyze-selector" disabled>
                    <option value="">-- First select a device --</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="mb-3">
          <button type="button" id="btnAnalyze" class="btn btn-primary" disabled>
            <span id="btnAnalyzeSpinner" class="spinner-border spinner-border-sm" style="display:none" role="status" aria-hidden="true"></span>
            Analyze
          </button>
        </div>

        <div id="analyzeError" class="alert alert-danger collapse" role="alert"></div>
        <div id="analyzeLoading" class="text-muted">Analyzing... this may take a moment for large files.</div>

        <div class="table-responsive" id="resultsSection" style="display:none">
          <div id="analyzeTableContainer"></div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="libs/TableFilter/TableFilter.js"></script>
    <script src="libs/TableSorter/js/jquery.tablesorter.min.js"></script>
    <script src="libs/TableSorter/js/jquery.tablesorter.widgets.min.js"></script>
    <script src="navinit.js"></script>

    <script>
      var senderZipFiles = [];
      var receiverZipFiles = [];
      var hasReceiverData = false;

      var theadHtml = '<thead><tr>' +
        '<th scope="col">MessageTypeName</th>' +
        '<th scope="col">InstanceName</th>' +
        '<th scope="col">MessageSubTypeName</th>' +
        '<th scope="col">SICardNumber</th>' +
        '<th scope="col">SportIdent</th>' +
        '<th scope="col">SIStationNumber</th>' +
        '<th scope="col">SICardNumber2</th>' +
        '<th scope="col">SportIdent2</th>' +
        '<th scope="col">SIStationNumber2</th>' +
        '<th scope="col">SentDate</th>' +
        '<th scope="col">Ack/SendFailed</th>' +
        '<th scope="col">NoOfSendTries</th>' +
        '<th scope="col">SubscriberTypeName</th>' +
        '<th scope="col">TransformName</th>' +
        '<th scope="col" class="receiver-col">Recv ChecksumOK</th>' +
        '<th scope="col" class="receiver-col">Recv CreatedDate</th>' +
        '</tr></thead>';

      function formatSportIdent(hour, minute, second) {
        if (hour == null && minute == null && second == null) return '';
        return String(hour || '0').padStart(2, '0') + ':' +
               String(minute || '0').padStart(2, '0') + ':' +
               String(second || '0').padStart(2, '0');
      }

      function loadDevices() {
        $.ajax({ url: '/api/v1/LogArchives/Devices', dataType: 'json' }).then(function (data) {
          var devices = Array.isArray(data) ? data : (data.devices || []);
          var senderSelect = $('#senderDeviceSelect');
          var receiverSelect = $('#receiverDeviceSelect');
          senderSelect.find('option:not(:first)').remove();
          receiverSelect.find('option:not(:first)').remove();
          $.each(devices, function () {
            var name = this.name || this.BTAddress;
            var opt = '<option value="' + this.BTAddress + '">' + name + ' (' + this.BTAddress + ')</option>';
            senderSelect.append(opt);
            receiverSelect.append(opt);
          });
        });
      }

      function loadZipFiles(btAddress, callback, targetSelect) {
        if (!btAddress) {
          targetSelect.empty().append('<option value="">-- First select a device --</option>').prop('disabled', true);
          callback([]);
          return;
        }
        targetSelect.empty().append('<option value="">Loading...</option>').prop('disabled', true);
        $.ajax({ url: '/api/v1/LogArchives/Files?BTAddress=' + encodeURIComponent(btAddress), dataType: 'json' })
          .then(function (files) {
            targetSelect.empty();
            if (files.length === 0) {
              targetSelect.append('<option value="">No zip files found</option>').prop('disabled', true);
              callback([]);
              return;
            }
            targetSelect.append('<option value="">-- Select a zip file --</option>');
            $.each(files, function () {
              targetSelect.append('<option value="' + this.filename + '">' + this.filename.replace('.zip', '') + '</option>');
            });
            targetSelect.prop('disabled', false);
            callback(files);
          })
          .fail(function () {
            targetSelect.empty().append('<option value="">Error loading files</option>').prop('disabled', true);
            callback([]);
          });
      }

      function updateAnalyzeButton() {
        $('#btnAnalyze').prop('disabled', !$('#senderZipSelect').val());
      }

      function buildTable(data) {
        var $container = $('#analyzeTableContainer');

        // Remove old table entirely so both plugins get a fresh DOM
        $container.empty();

        // Build fresh table
        var $table = $('<table class="table table-striped table-hover table-sm" id="analyzeResultsTable"></table>');
        $table.append('<caption>Analyzed Messages</caption>');
        $table.append(theadHtml);
        var $tbody = $('<tbody></tbody>');

        $.each(data, function () {
          var sportIdent = formatSportIdent(this.SportIdentHour, this.SportIdentMinute, this.SportIdentSecond);
          var sportIdent2 = formatSportIdent(this.SportIdentHour2, this.SportIdentMinute2, this.SportIdentSecond2);

          var ackCell = '';
          if (this.AckReceivedDate) {
            ackCell = '<td class="ack-cell">' + this.AckReceivedDate + '</td>';
          } else if (this.SendFailedDate) {
            ackCell = '<td class="sendfailed-cell">' + this.SendFailedDate + '</td>';
          } else {
            ackCell = '<td></td>';
          }

          var receiverCols = '';
          if (hasReceiverData) {
            var cls = '';
            if (this.recv_ChecksumOK === 1 || this.recv_ChecksumOK === '1') cls = 'ack-cell';
            else if (this.recv_ChecksumOK === 0 || this.recv_ChecksumOK === '0') cls = 'sendfailed-cell';
            receiverCols = '<td class="' + cls + '">' + (this.recv_ChecksumOK != null ? this.recv_ChecksumOK : '') + '</td>' +
              '<td>' + (this.recv_CreatedDate || '') + '</td>';
          }

          $tbody.append('<tr>' +
            '<td>' + (this.MessageTypeName || '') + '</td>' +
            '<td>' + (this.InstanceName || '') + '</td>' +
            '<td>' + (this.MessageSubTypeName || '') + '</td>' +
            '<td>' + (this.SICardNumber || '') + '</td>' +
            '<td>' + sportIdent + '</td>' +
            '<td>' + (this.SIStationNumber || '') + '</td>' +
            '<td>' + (this.SICardNumber2 || '') + '</td>' +
            '<td>' + sportIdent2 + '</td>' +
            '<td>' + (this.SIStationNumber2 || '') + '</td>' +
            '<td>' + (this.SentDate || '') + '</td>' +
            ackCell +
            '<td>' + (this.NoOfSendTries != null ? this.NoOfSendTries : '') + '</td>' +
            '<td>' + (this.SubscriberTypeName || '') + '</td>' +
            '<td>' + (this.TransformName || '') + '</td>' +
            receiverCols +
            '</tr>');
        });

        $table.append($tbody);
        $container.append($table);

        // Init plugins on the brand-new table
        $table.tablesorter({ theme: 'bootstrap', widgets: ['zebra'] });

        var tip = 'Quotes (") match phrases...';
        $table.tableFilter({
          columnFilters: [
            { columnName: 'MessageTypeName', inputType: 'text', toolTipMessage: tip },
            { columnName: 'InstanceName', inputType: 'text', toolTipMessage: tip },
            { columnName: 'MessageSubTypeName', inputType: 'text', toolTipMessage: tip },
            { columnName: 'SICardNumber', inputType: 'text', toolTipMessage: tip },
            { columnName: 'SportIdent', inputType: 'text', toolTipMessage: tip },
            { columnName: 'SIStationNumber', inputType: 'text', toolTipMessage: tip },
            { columnName: 'SICardNumber2', inputType: 'text', toolTipMessage: tip },
            { columnName: 'SportIdent2', inputType: 'text', toolTipMessage: tip },
            { columnName: 'SIStationNumber2', inputType: 'text', toolTipMessage: tip },
            { columnName: 'SentDate', inputType: 'text', toolTipMessage: tip },
            { columnName: 'Ack/SendFailed', inputType: 'text', toolTipMessage: tip },
            { columnName: 'NoOfSendTries', inputType: 'text', toolTipMessage: tip },
            { columnName: 'SubscriberTypeName', inputType: 'ddl', toolTipMessage: tip },
            { columnName: 'TransformName', inputType: 'ddl', toolTipMessage: tip },
            { columnName: 'Recv ChecksumOK', inputType: 'text', toolTipMessage: tip },
            { columnName: 'Recv CreatedDate', inputType: 'text', toolTipMessage: tip }
          ],
          enableCookies: false
        });

        $('#resultsSection').show();
      }

      $(function () {
        $('#nav-placeholder').load('navigation.html', function () {
          initNavigation();
          getIsLoggedIn(function (isLoggedIn) {
            if (isLoggedIn) {
              $('#analyzerSection').show();
              loadDevices();
            } else {
              $('#loginRequiredAlert').removeClass('collapse');
            }
          });
        });

        $('#senderDeviceSelect').on('change', function () {
          loadZipFiles($(this).val(), function (files) { senderZipFiles = files; updateAnalyzeButton(); }, $('#senderZipSelect'));
        });

        $('#receiverDeviceSelect').on('change', function () {
          loadZipFiles($(this).val(), function (files) { receiverZipFiles = files; updateAnalyzeButton(); }, $('#receiverZipSelect'));
        });

        $('#senderZipSelect, #receiverZipSelect').on('change', updateAnalyzeButton);

        $('#btnAnalyze').on('click', function () {
          var senderZip = $('#senderZipSelect').val();
          var receiverZip = $('#receiverZipSelect').val();
          if (!senderZip) return;

          $('#analyzeError').addClass('collapse');
          $('#btnAnalyzeSpinner').show();
          $('#btnAnalyze').prop('disabled', true);
          $('#analyzeLoading').show();
          $('#resultsSection').hide();

          var url = '/api/v1/LogArchives/Analyze?senderZip=' + encodeURIComponent(senderZip);
          if (receiverZip) url += '&receiverZip=' + encodeURIComponent(receiverZip);

          $.ajax({ url: url, dataType: 'json' })
            .then(function (data) {
              $('#btnAnalyzeSpinner').hide();
              $('#btnAnalyze').prop('disabled', false);
              $('#analyzeLoading').hide();

              if (data.code) {
                $('#analyzeError').text(data.message || 'Unknown error').removeClass('collapse');
                return;
              }

              var messages = Array.isArray(data) ? data : (data.messages || []);
              console.log('Messages returned:', messages.length);

              hasReceiverData = !!receiverZip;
              $('.receiver-col').toggle(hasReceiverData);

              buildTable(messages);
            })
            .fail(function (jqXHR) {
              $('#btnAnalyzeSpinner').hide();
              $('#btnAnalyze').prop('disabled', false);
              $('#analyzeLoading').hide();
              var msg = 'Analysis failed';
              try { var resp = JSON.parse(jqXHR.responseText); if (resp.message) msg = resp.message; } catch (e) {}
              $('#analyzeError').text(msg).removeClass('collapse');
            });
        });
      });
    </script>
  </body>
</html>
