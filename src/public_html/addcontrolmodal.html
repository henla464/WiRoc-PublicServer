<div class="modal fade" id="additem" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog">
                <div class="modal-content">
                  <div class="modal-header">
                        <h5 class="modal-title" id="addItemTitle">Add control</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"/>
                  </div>
                  <div class="modal-body additem-form">
                        <form id="addItemForm" class="needs-validation" novalidate>
                                <p id="addItemDescription">Please fill in this form to add a control!</p>
                                <div class="form-group mb-3">
                                        <div class="input-group">
                                                <span class="input-group-addon"><i class="fa fa-hashtag"></i></span>
                                                <input type="number" class="form-control" id="controlNumberInput" name="ControlNumber" placeholder="Control Number" required="required" min="1" step="1">
                                                <div class="invalid-feedback">
                                                        Please enter a valid control number.
                                                </div>
                                        </div>
                                </div>
                                <div class="form-group mb-3">
                                        <div class="input-group">
                                                <span class="input-group-addon"><i class="fa fa-pencil"></i></span>
                                                <input type="text" class="form-control" id="controlNameInput" name="ControlName" placeholder="Control Name" required="required">
                                                <div class="invalid-feedback">
                                                        Please enter the control name.
                                                </div>
                                        </div>
                                </div>
                                <div class="form-group mb-3">
                                        <div class="input-group">
                                                <span class="input-group-addon"><i class="fa fa-file-text"></i></span>
                                                <input type="text" class="form-control" id="controlDescriptionInput" name="ControlDescription" placeholder="Description (optional)">
                                        </div>
                                </div>
                                
                                <div class="alert alert-danger collapse" id="errorAlert" role="alert">Could not save, error while saving to database</div>
                                
                                <div class="form-group d-flex">
                                        <button type="button" id="buttonAddItem" class="submit btn btn-secondary btn-lg ms-auto">Add control</button>
                                </div>

                        </form>
                  </div>
                </div>
        </div>
</div>
